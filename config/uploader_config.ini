# ============================================================
#  YouTube アップロード設定ファイル
# ============================================================


# ----------------------------------------------------------------
# [general] 基本設定
# ----------------------------------------------------------------
[general]
# 本番アップロードを行うか否か
# false = ダミーモード（APIを叩かず動作確認のみ）
# true  = 実際に YouTube へアップロードする
production = true

# ----------------------------------------------------------------
# [video] 動画メタデータ（固定値）
# ----------------------------------------------------------------
[video]
# YouTube カテゴリID
# 27 = Education（教育）
category_id = 28

# 動画のデフォルト言語
default_language = ja

# 音声のデフォルト言語
default_audio_language = ja

# 公開設定: private / unlisted / public
# ※ 予約投稿（publish_at）を使う場合は必ず private にすること
privacy_status = private

# 子ども向けコンテンツか（false 推奨）
self_declared_made_for_kids = false

# 統計情報の公開（true = 視聴回数などを公開）
public_stats_viewable = true

# 埋め込み許可
embeddable = true

# ライセンス: youtube（標準） / creativeCommon
license = youtube

# 固定タグ（カンマ区切り）
# CSVの themes から生成される動的タグと結合される
tags_base = 雑学,shorts

# AI生成コンテンツの宣言（true = 宣言する / false = しない）
# 実写に近い画像を使う場合は true に変更してください
has_altered_content = false


# ----------------------------------------------------------------
# [schedule] 予約投稿設定
# ----------------------------------------------------------------
[schedule]
# 公開時刻の候補（日本時間・24時間表記、カンマ区切り）
# スクリプト実行時点の次の直近時刻が自動選択される
# 例) 18,21 → 18:00 JST または 21:00 JST
# ※ 内部で UTC に変換して API へ渡す（JST = UTC+9）
#publish_hour = 7,12,15,18,21
publish_hour = 12,18,21


# ----------------------------------------------------------------
# [description] 説明文テンプレート
# {themes} はCSVの themes 列に置換される
# ----------------------------------------------------------------
[description]
template =
    {name}
	30秒でわかる！思わず「へぇ〜」となるヒミツ！

	「もっと知りたい！」と思ったら、
	チャンネル登録してね

	VOICEVOX：ずんだもん 東北きりたん
	{themes}


# ----------------------------------------------------------------
# [effects] エフェクト・演出設定（将来拡張用）
# ----------------------------------------------------------------
[effects]
# フェードイン時間（秒）
# fade_in_duration = 1.0

# フェードアウト時間（秒）
# fade_out_duration = 1.0


# ----------------------------------------------------------------
# [playlist] 再生リスト設定
# ----------------------------------------------------------------
[playlist]
# 再生リスト機能の有効化（true=有効, false=無効）
enable_auto_add = false

# 再生リストID（複数指定可、カンマ区切り）
# YouTube Studio で確認可能
#playlist_ids = YOUR_PLAYLIST_ID

# 再生リスト追加エラー時の挙動
# warn  = 警告のみ出力して処理続行
# fail  = エラーと判定して処理中断
on_playlist_error = warn


# ----------------------------------------------------------------
# [paths] パス設定（デフォルト値はスクリプト内で定義済み）
# 記述するとスクリプト側のデフォルトを上書きする
# ----------------------------------------------------------------
[paths]
