# ============================================================
#  manager_config.ini
#  パイプラインマネージャー設定ファイル
# ============================================================


# ----------------------------------------------------------------
# [stock] 在庫閾値設定
# ----------------------------------------------------------------
[stock]
# ── Seed生成設定 ──
# theme_targetに対する種の生成倍率
seed_multiplier = 1.5
# 種の重複防止期間（日数）
seed_exclusion_days = 180

# ── テーマ在庫（themes.csv の status=0 件数） ──
# この値を下回ったら theme_generator を実行する
theme_min    = 10

# theme_generator 実行後の目標件数
theme_target = 15

# ── 原稿在庫（themes.csv の status=1 件数） ──
# この値を下回ったら genkou_generater を実行する
genkou_min   = 10

# ── 背景在庫（themes.csv の status=2 件数） ──
# この値を下回ったら image_minerater を実行する
image_min = 10


# ── 動画在庫（themes.csv の status=3 件数） ──
# この値を下回ったら movie_generater を実行する
movie_min    = 5




# ----------------------------------------------------------------
# [upload] 投稿設定
# ----------------------------------------------------------------
[upload]
# 1回の実行で投稿する最大本数
max_upload = 3


# ----------------------------------------------------------------
# [paths] パス設定（デフォルト値はスクリプト内で定義済み）
# 記述するとスクリプト側のデフォルトを上書きする
# ----------------------------------------------------------------
[paths]



# ----------------------------------------------------------------
# [paradox] paradox modifier 設定
# ----------------------------------------------------------------
[paradox]
# テーマ生成時に paradox modifier を適用する割合（0.0 〜 1.0）
# 例) 0.5 = 生成テーマの半数を paradox タイプにする
#     0.0 = paradox OFF（全件通常タイプ）
#     1.0 = paradox ON（全件 paradox タイプ）
paradox_ratio = 1.0


# ----------------------------------------------------------------
# [limit] 在庫目標数・投稿上限数
#
# theme / genkou / movie は「目標在庫数」を指定する。
#   実行時に (目標 - 現在の在庫) 件だけ生成・処理する。
#   例) movie_target_stock=10、現在の動画在庫=8 → 2本だけ生成
#
# コメントアウトすると各スクリプト側のデフォルト動作に従う。
# ----------------------------------------------------------------
[limit]
# theme_generator: テーマ在庫の目標数
# (目標 - 現在の status=0 件数) 件を生成する
# コメントアウト時は theme_gen_config.txt の THEME_GENERATE_COUNT を使用
theme_target_stock = 15

# genkou_generater: 原稿在庫の目標数
# (目標 - 現在の status=1 件数) 件を処理する
# コメントアウト時は status=0 の全件を処理
genkou_target_stock = 5

# image_generater: 画像在庫の目標数
# (目標 - 現在の status=1 件数) 件を処理する
# コメントアウト時は status=0 の全件を処理
image_target_stock = 5

# movie_generater: 動画在庫の目標数
# (目標 - 現在の status=2 件数) 件を生成する
# コメントアウト時は status=1 の全件を処理
movie_target_stock = 5

# youtube_uploader: 1回で投稿する最大本数（目標方式ではなく上限値）
# ※ [upload] max_upload と同じ項目。こちらが優先される。
# コメントアウト時は [upload] max_upload の値を使用
upload_max_count = 3


# ----------------------------------------------------------------
# [seed] ローカルLLMによる種生成設定
# seed_gen.py が Ollama を使ってテーマの「種単語」を事前生成する。
# Claudeへの除外リスト注入が不要になりトークンを節約できる。
# ----------------------------------------------------------------
[seed]
# seed_count = ceil(theme_target × seed_multiplier)
# 例: theme_target=30, multiplier=1.5 → 45種生成 → リジェクト後~30件が残る
seed_multiplier = 1.5
# 直近この日数以内の specific_tag を禁止リストとして渡す（0=全件）
seed_exclusion_days = 180
# ローカルLLMエンドポイント（Ollama）
endpoint = http://localhost:11434/api/generate
# 使用モデル名
model = gemma4:e4b
# タイムアウト秒数
timeout = 60


# ----------------------------------------------------------------
# [discord] Discord 通知設定
# ----------------------------------------------------------------
[discord]
# Discord Webhook URL（空にすると通知なし）
# 設定方法: Discord サーバー → チャンネル設定 → 連携サービス → ウェブフック
webhook_url =


# ----------------------------------------------------------------
# [timeout] タイムアウト設定
# 各ステップがこの時間（秒）以内に完了しない場合、タイムアウト＆リトライ
# ----------------------------------------------------------------
[timeout]
# 各ステップのタイムアウト時間（秒）
theme_timeout = 300
genkou_timeout = 300
image_timeout = 600
movie_timeout = 600
upload_timeout = 300

# リトライ回数（デフォルト）
max_retries = 3
