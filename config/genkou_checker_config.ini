# ============================================================
#  genkou_checker_config.ini
#  台本後処理チェック設定ファイル
# ============================================================

[check]
max_attempts = 5

[length]
# intro: paradox形式は「前振り/メイン/述語」の3分割 → / を含む全体で最大20文字
intro_min = 8
intro_max = 20

# body: font_size=84px、box_inner=744px → 約8文字/行 × 3行 = 24文字
body_part_min = 8
body_part_max = 23
body_part2_max = 23

# commentのみ3行（24文字）まで許容
comment_min = 12
comment_max = 24

# トリミング無効・オーバーは全てrejected→再生成
minor_over = 0

[structure]
body1_prefix = 実は
body3_prefixes = だから,それで,そのせいで

[ngwords]
words = いつも,必ず,いつでも,絶対,かならず,ずっと,どんなときも,同じるよ,ためんだ


[duplicate]
threshold = 2
